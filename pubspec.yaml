name: jaspr_elementary
description: >
  MVVM architecture for Jaspr applications, inspired by Flutter Elementary.
  Provides tools for separating business logic and UI with automatic ViewModel
  lifecycle management.
version: 0.1.0
homepage: https://github.com/san-smith/jaspr_elementary
repository: https://github.com/san-smith/jaspr_elementary
issue_tracker: https://github.com/san-smith/jaspr_elementary/issues
documentation: https://pub.dev/documentation/jaspr_elementary/latest/

environment:
  sdk: ^3.10.7

dependencies:
  jaspr: ^0.22.2
  meta: ^1.9.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

# Topics help users discover your package on pub.dev
topics:
  - jaspr
  - mvvm
  - architecture
  - web
  - flutter-elementary

# Platforms this package supports
platforms:
  web:
